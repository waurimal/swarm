<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Words 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Noto Sans KR', 'sans-serif'], jua: ['Jua', 'sans-serif'] }, colors: { primary: '#bc84ee', secondary: '#dcfd8b', accent: '#ff823a' } } } }
    </script>
    <style>
        body { background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none !important; }
        .screen.active { display: flex !important; }
        @keyframes flyRight { 0% { left: -50%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 150%; opacity: 0; } }
        @keyframes flyLeft { 0% { left: 150%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: -50%; opacity: 0; } }
        .flying-word { position: absolute; font-family: 'Jua', sans-serif; font-size: 20rem; white-space: nowrap; user-select: none; text-shadow: 8px 8px 0px white, -8px -8px 0px white, 8px -8px 0px white, -8px 8px 0px white; opacity: 0; z-index: 10; pointer-events: none; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans text-slate-800">
    <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center"><i class="fas fa-spinner fa-spin text-5xl text-primary mb-4"></i></div>
    <div id="modal-alert" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center"><div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl mx-4"><p id="modal-alert-msg" class="text-lg font-bold text-slate-700 mb-8"></p><button onclick="closeAlert()" class="bg-primary text-white px-8 py-3 rounded-xl font-jua text-xl w-full">확인</button></div></div>
    <div id="modal-confirm" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center"><div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl mx-4"><p id="modal-confirm-msg" class="text-lg font-bold text-slate-700 mb-8"></p><div class="flex gap-3"><button id="modal-confirm-yes" class="flex-1 bg-red-500 text-white px-4 py-3 rounded-xl font-jua text-xl">예</button><button onclick="closeConfirm()" class="flex-1 bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-jua text-xl">아니오</button></div></div></div>

    <nav id="main-nav" class="hidden bg-white shadow-sm p-4 px-6 justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')"><i class="fas fa-bug text-primary text-3xl"></i><h1 class="text-2xl font-jua text-primary">Counting Words</h1></div>
        <button onclick="navigate('home')" class="px-5 py-2.5 bg-slate-100 rounded-xl font-bold"><i class="fas fa-home mr-2"></i> 처음으로</button>
    </nav>

    <main class="flex-grow relative overflow-hidden p-4 flex flex-col items-center justify-center">
        <!-- 화면 1: 홈 -->
        <div id="screen-home" class="screen active flex-col items-center justify-center w-full max-w-5xl h-full text-center">
            <h1 class="text-7xl font-jua text-slate-800 mb-10">Counting Words</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full px-4">
                <button onclick="navigate('student_setup')" class="bg-white border-4 border-primary p-10 rounded-3xl shadow-xl flex flex-col items-center"><i class="fas fa-gamepad text-6xl text-primary mb-6"></i><span class="text-3xl font-jua">게임 시작</span></button>
                <button onclick="navigate('leaderboard')" class="bg-white border-4 border-secondary p-10 rounded-3xl shadow-xl flex flex-col items-center"><i class="fas fa-trophy text-6xl text-amber-500 mb-6"></i><span class="text-3xl font-jua">명예의 전당</span></button>
                <button onclick="navigate('teacher_login')" class="bg-white border-4 border-slate-300 p-10 rounded-3xl shadow-xl flex flex-col items-center"><i class="fas fa-chalkboard-teacher text-6xl text-slate-600 mb-6"></i><span class="text-3xl font-jua">교사 모드</span></button>
            </div>
        </div>

        <!-- 화면: 게임 -->
        <div id="screen-game" class="screen flex-col w-full h-full relative bg-white rounded-3xl border-4 border-slate-100">
            <div id="game-canvas" class="flex-grow w-full h-full relative z-0"></div>
            <div class="absolute bottom-10 left-0 w-full flex justify-center px-4">
                <div class="bg-white rounded-[24px] shadow-xl p-6 border-2 border-[#dcfd8b] w-full max-w-sm">
                    <p class="text-slate-700 font-jua mb-3 text-lg text-center">정답 단어가 몇 개 지나갔나요?</p>
                    <div class="flex gap-2">
                        <input type="number" id="game-answer" class="w-full p-3 rounded-xl border border-slate-200 text-center text-2xl font-bold outline-none focus:ring-2 focus:ring-[#ff823a]" placeholder="숫자 입력" onkeypress="if(event.key === 'Enter') submitAnswer()">
                        <button onclick="submitAnswer()" class="bg-[#ff823a] text-white px-6 rounded-xl font-jua text-2xl">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const state = { units: [], scores: [], db: null, appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app' };
        
        window.navigate = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
        };
        
        window.closeAlert = () => document.getElementById('modal-alert').classList.add('hidden');
        window.closeConfirm = () => document.getElementById('modal-confirm').classList.add('hidden');

        async function init() {
            const firebaseConfig = { apiKey: "AIzaSyBM_93jHRAwHuxFYMlHpa7kqAVp0u2v7U0", projectId: "swarm-c23b4" };
            const app = initializeApp(firebaseConfig);
            state.db = getFirestore(app);
            await signInAnonymously(getAuth(app));
            document.getElementById('loading-overlay').style.display = 'none';
        }

        window.startGameAnimation = () => {
            const canvas = document.getElementById('game-canvas');
            canvas.innerHTML = '';
            for(let i=0; i<5; i++) {
                const el = document.createElement('div');
                el.className = 'flying-word';
                el.innerText = '예시';
                el.style.top = (Math.random()*40 + 10) + '%';
                el.style.animation = (Math.random() > 0.5 ? 'flyRight' : 'flyLeft') + ' 5s linear infinite';
                canvas.appendChild(el);
            }
        };

        window.submitAnswer = () => {
            const val = document.getElementById('game-answer').value;
            if(!val) return;
            alert("입력 완료: " + val);
        };

        window.onload = () => { init(); startGameAnimation(); };
    </script>
</body>
</html>
